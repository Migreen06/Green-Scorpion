<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Scorpion Web Development</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .bg-scorpion-gradient {
            background: radial-gradient(circle, #064e3b, #022c22, #000000);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    
        body {
            background: radial-gradient(circle, #022c22, #000000, #023729);
            font-family: ui-sans-serif, system-ui, sans-serif;
            color: white;
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
    
        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 2rem;
        }
    
        header {
            padding: 1rem 1rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(5, 10, 8, 0.8);
            backdrop-filter: blur(10px);
        }
    
        .logo {
            display: flex;
            font-weight: 900;
            font-style: italic;
            color: white;
            justify-content: flex-start;
            padding-left: 1rem;
            padding-right: 5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            font-size: 1.5rem;
        }
    
        p {
            padding: 1rem 0; 
        }
    
        @keyframes pulse {
            0% {
                opacity: 1;
            }
    
            50% {
                opacity: 0.4;
            }
    
            100% {
                opacity: 1;
            }
        }

        #menu-toggle,
        label,
        input {
            display: none;
        }
    
    
    
    
        @media (max-width: 768px) {
            body {
                overflow-x: hidden;
            }
    
            .menu ul {
                box-sizing: border-box;
                max-width: calc(100vw - 2rem);
            }
    
            .logo {
                display: none;
            }
    
            header {
                max-width: 100%;
                padding: 0.5rem;
            }
    
            nav {
                align-items: center;
                padding: 0px;
                display: flex;
                text-align: left;
                justify-content: space-between;
            }
    
            label[for="menu-toggle"] {
                display: inline-block;
                color: white;
                font-size: 1rem;
                padding: 0.5rem 2rem;
                cursor: pointer;
            }
    
            .menu ul {
                display: none;
                flex-direction: column;
                position: absolute;
                font-size: 1rem;
                width: 100px;
                top: 60px;
                background: radial-gradient(circle, #064e3b, #022c22, #000000);
                box-shadow: 2px 2px 10px 2px rgba(255, 255, 255, 0.5);
                z-index: 1;
            }
    
            #menu-toggle:checked~ul {
                display: flex;
            }
    
            #menu-toggle {
                display: none;
            }
            
            h1 {
                line-height: 1.2rem;
            }
    
            li a {
                font-size: 1.1em;
                display: block;
                line-height: 2em;
                padding: 5%;
            }
        }

    </style>
</head>


<body>
    <header>
        <nav>
            <a href="index.html">
                <div class="group">
                    <img src="logo.svg" width="36" height="36">
                    <div class="logo">
                        GREEN <span style="color:#10b981;padding-left:.5rem;"> SCORPION</span>
                    </div>
                </div>
            </a>
    
            <div class="menu">
                <input type="checkbox" id="menu-toggle">
                <label for="menu-toggle">
                    <img src="menu.svg">
                </label>
                <ul>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a href="results.html">Results</a></li>
                </ul>
            </div>
        </nav>
    </header>

<h1>Green Scorpion Web Development</h1>
    <img src="darker-tinified.png" height="300" width="300" alt="scorpion">
    <main>
        <h2>Precision Coding & Design.<br>Stinging Results.</h2>
        <p>
            We build high-performance digital ecosystems for global brands using a code-first philosophy.
        </p>
        <button style="max-width:200px;">
            <a href="portfolio.html">
                View Our Work
            </a>
        </button>
    </main>

</body>
<footer>
    2024 Green Scorpion Web Development. All rights reserved.
</footer>
</html>
