<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Scorpion Web Development</title>
    <style>
   /* --- Global Styles & Keyframes --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: radial-gradient(circle, #022c22, #000000, #023729);
    font-family: ui-sans-serif, system-ui, sans-serif;
    color: white;
    line-height: 1.6;
    overflow-x: hidden;
    scroll-behavior: smooth;
}

@keyframes slideInFromBottom {
    from { opacity: 0; transform: translateY(50px); }
    to { opacity: 1; transform: translateY(0); }
}

/* --- Header & Navigation --- */
header {
    padding: 1rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(5, 10, 8, 0.8);
    backdrop-filter: blur(10px);
}

nav {
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding-bottom: 2rem;
}

.group {
    display: flex;
    align-items: center;
    justify-content: flex-start;
}

.logo {
    display: flex;
    font-weight: 900;
    font-style: italic;
    color: white;
    padding-left: 1rem;
    padding-right: 5rem;
    text-transform: uppercase;
    letter-spacing: -1px;
    font-size: 1.5rem;
}

#menu-toggle, label, input {
    display: none;
}

ul {
    display: inline-flex;
    list-style: none;
    gap: 15px;
    font-weight: 500;
    text-transform: uppercase;
}

li { color: #10b981; }

li:hover {
    color: #0ac687b4;
    text-decoration: underline;
    text-decoration-thickness: 3px;
    transition: ease-in 0.3s;
}

a {
    text-decoration: none;
    color: white;
    padding: 20px;
}

/* --- Content Elements --- */
h1 {
    font-weight: bold;
    color: white;
    line-height: 2em;
    font-size:4rem;
    font-style: italic;
    text-align: center;
}

h2 {
    font-weight: 700;
    font-size: 2rem;
    animation: slideInFromBottom 2s ease-in;
}

p { padding: 1rem 0; }

img {
    display: block;
    margin: auto;
}

main {
    text-align: center;
    margin: auto;
}

button {
    background: radial-gradient(circle, #064e3b, #022c22, #000000);
    padding: 10px 20px;
    font-weight: 600;
    margin: 2rem auto;
    border-radius: 8px;
    max-width: 200px;
}

button:hover {
    scale: 1.2;
    transition: ease-in 0.3s;
}

footer {
    font-size: 15px;
    text-align: center;
    margin: 0 auto;
    padding-top: 50px;
}

/* --- Responsive Design --- */
@media (max-width: 768px) {
    .logo { display: none; }
    
    header { padding: 0.5rem; }
    
    nav { justify-content: space-between; padding: 0; }
    
    label[for="menu-toggle"] {
        display: inline-block;
        cursor: pointer;
    }

    .menu ul {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 60px;
        background: radial-gradient(circle, #064e3b, #022c22, #000000);
        box-shadow: 2px 2px 10px 2px rgba(255, 255, 255, 0.5);
        z-index: 1;
    }

    #menu-toggle:checked ~ ul { display: flex; }

    li a {
        font-size: 1.1em;
        display: block;
        padding: 15px;
    }
}



    </style>
</head>


<body>
    <header>
        <nav>
            <a href="index.html">
                <div class="group">
                    <img src="logo.svg" width="36" height="36">
                    <div class="logo">
                        GREEN <span style="color:#10b981;padding-left:.5rem;"> SCORPION</span>
                    </div>
                </div>
            </a>

            <div class="menu">
                <input type="checkbox" id="menu-toggle">
                <label for="menu-toggle">
                    <img src="menu.svg">
                </label>
                <ul>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a href="results.html">Results</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <h1>Green Scorpion Web Development</h1>
    <img src="darker-tinified.png" height="300" width="300" alt="scorpion">
    <main>
        <h2>Precision Coding & Design.<br>Stinging Results.</h2>
        <p>
            We build high-performance digital ecosystems for global brands using a code-first philosophy.
        </p>
        <button style="max-width:200px;">
            <a href="portfolio.html">
                View Our Work
            </a>
        </button>
    </main>

</body>
<footer>
    2024 Green Scorpion Web Development. All rights reserved.
</footer>

</html>
