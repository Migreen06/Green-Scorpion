<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Only Carousel</title>
    <style>
        .carousel {
            position: relative;
            max-width: 60%;
            padding-top: 2rem;
            padding-bottom: 5rem;
            height: auto;
            margin: 0 auto;
            display: block;
            overflow: hidden;
            border-radius: 10px;
            scroll-snap-align: center;
            scroll-snap-stop: always;
            container-type: scroll-state;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        input[type="radio"] {
            display: none;
        }

        .slides {
            display: flex;
            width: 200%;
            margin: 0 auto;
            height: auto;
        }

        &::before,
        &::after {
            content: '';
        }

        .slide {
            width: 33.33%;
            height: auto;
            flex-shrink: 0;
        }

        .slide video {
            display: block;
            width: 100%;
            margin: 0 auto;
            object-fit: cover;
            height: auto;
            transition: ease-in 0.3s;
        }


        #slide1:checked~.slides {
            animation: slideleft 15s ease-in-out;
        }

        #slide2:checked~.slides {
            animation: slideleft 15s ease-in-out;
        }

        @keyframes slideleft {
            from {
                transform: translatex(-100px);
            }

            to {
                transform: translatex(80%);
            }
        }


        .buttons {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .buttons label {
            width: 20px;
            height: 20px;
            background: white;
            color: #023729;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s;
        }


        input#slide1:checked~.buttons label[for="slide1"],
        input#slide2:checked~.buttons label[for="slide2"],
        input#slide3:checked~.buttons label[for="slide3"] {
            background: white;
        }

        :root {
            --bg-color: radial-gradient(circle, #064e3b, #022c22, #000000);
            --accent-color: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.4);
            --text-main: #e5e5e5;
            --text-dim: #a3a3a3;
            --card-bg: #0a0f0d;
            --border-color: #1a2e25;
            --mono-font: 'mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        .group {
            align-items: center;
            display: flex;
            justify-content: flex-start;
        }


        body {
            background: radial-gradient(circle, #022c22, #000000, #023729);
            font-family: ui-sans-serif, system-ui, sans-serif;
            color: white;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }


        body::before {
            content: "GREEN SCORPION";
            position: fixed;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 10vw;
            font-weight: 700;
            letter-spacing: -4px;
            color: rgba(255, 255, 255, 0.08);
            white-space: nowrap;
            z-index: -1;
            pointer-events: none;
        }


        .hero {
            padding: 3rem 0 4rem 0;
            text-align: center;
            background: rgba(5, 10, 8, 0.8);
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            font-style: italic;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -4px;
            animation: appear 2s ease-in;
            margin-bottom: 2rem;
        }

        .hero p {
            max-width: 90%;
            margin: 0 auto;
            color: var(--text-dim);
            font-size: 1.3rem;
        }

        nav ul {
            font-weight: 500;
            list-style: none;
            gap: 15px;
            text-decoration: none;
            text-transform: uppercase;
            justify-content: space-between;
            display: inline-flex;
        }

        li reveal {
            color: white;
            text-decoration: none;
            display: flex;
            text-align: left;
        }


        header {
            padding: 1rem 1rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(5, 10, 8, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            font-weight: 900;
            font-style: italic;
            color: white;
            justify-content: flex-start;
            padding-left: 1rem;
            padding-right: 5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            font-size: 1.5rem;
        }

        a {
            color: white;
            text-decoration: none;
            padding: 20px;
        }

        ul {
            font-weight: 500;
            list-style: none;
            gap: 15px;
            text-decoration: none;
            text-transform: uppercase;
            justify-content: space-between;
            display: inline-flex;
        }



        nav {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            padding-bottom: 2rem;
        }



        #menu-toggle {
            display: none;
        }


        label[for="menu-toggle"] {
            display: none;
        }

        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .reveal {
            view-timeline-name: --reveal;
            view-timeline-axis: block;
            animation: reveal linear both;
            animation-timeline: --reveal;
            animation-range: entry 5% entry 35%;
        }


        @media (max-width: 768px) {
            body {
                overflow-x: hidden;
            }

            .menu ul {
                box-sizing: border-box;
                max-width: calc(100vw - 2rem);
            }

            .logo {
                display: none;
            }

            header {
                max-width: 100%;
                padding: 0.5rem;
            }

            nav {
                align-items: center;
                padding: 0px;
                display: flex;
                text-align: left;
                justify-content: space-between;
            }

            label[for="menu-toggle"] {
                display: inline-block;
                color: white;
                font-size: 1rem;
                padding: 0.5rem 2rem;
                cursor: pointer;
            }

            .menu ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 60px;
                right: 1rem;
                width: 150px;
                background: radial-gradient(circle, #064e3b, #022c22, #000000);
                box-shadow: 2px 2px 10px 2px rgba(255, 255, 255, 0.5);
                z-index: 1;
            }

            #menu-toggle:checked~ul {
                display: flex;
            }

            #menu-toggle {
                display: none;
            }


            li a {
                font-size: 1.1em;
                display: block;
                line-height: 2em;
                padding: 5%;
            }
        }
    </style>
</head>



<body>

    <header>
        <nav>
            <a href="index.html">
                <div class="group">
                    <img src="logo.svg" width="36" height="36">
                    <div class="logo">
                        GREEN <span style="color:#10b981;padding-left:.5rem;"> SCORPION</span>
                    </div>
                </div>
            </a>

            <div class="menu">
                <input type="checkbox" id="menu-toggle">
                <label for="menu-toggle">
                    <img src="menu.svg">
                </label>
                <ul>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a href="results.html">Results</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section class="hero">

            <h1>Marketing <br><span style="color:#10b981;">Videos</span></h1>
            <p></p>
        </section>
        <div class="carousel">
            <input type="radio" name="slides" id="slide1" checked>
            <input type="radio" name="slides" id="slide2">
            <input type="radio" name="slides" id="slide3">

            <div class="slides">
                <div class="slide"><video src="BrownSugarPremiumGuitarandBass.mp4" alt="Slide 1" controls
                        poster="Screenshot 2025-12-11 050652.png"></div>
                <div class="slide"><video src="finished true tune (1).mp4" alt="Slide 3" controls
                        poster="poster true tune.png"></div>
                <div class="slide"><video src="neck video.mp4" alt="Slide 2" poster="neck video.png" controls></div>

            </div>

            <div class="buttons" style="color:black;text-align:center;">
                <label for="slide1">1</label>
                <label for="slide2">2</label>
                <label for="slide3">3</label>
            </div>
        </div>
    </main>
</body>

</html>
