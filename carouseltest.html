<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Only Carousel</title>
    <style>


        .group {
            align-items: center;
            display: flex;
            justify-content: flex-start;
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        h1 {
            font-weight: 700;
            text-align: center;
            font-size: 4rem;
            animation: appear 2s ease-in;
            color: white;
            line-height: 2em;
            font-style: italic;
        }

        header {
            padding: 1rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(5, 10, 8, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            font-weight: 900;
            font-style: italic;
            color: white;
            justify-content: flex-start;
            padding-left: 1rem;
            padding-right: 5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            font-size: 1.5rem;
        }

        #menu-toggle {
            display: none;
        }

        a {
            text-decoration: none;
            color: white;
            padding: 20px;
        }


        nav {
            padding-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .nav-link {
            position: relative;
            transition: color 0.3s ease;
        }


        nav.ul {
            font-weight: 500;
            list-style: none;
            gap: 15px;
            text-decoration: none;
            text-transform: uppercase;
            justify-content: space-around;
            display: inline-flex;
        }

        body {
            background: radial-gradient(circle, #022c22, #000000, #023729);
            font-family: ui-sans-serif, system-ui, sans-serif;
            color: white;
            scroll-behavior: smooth;
        }

        .carousel {
            margin-left: 15%;
            margin-right: 15%;
        }

        ul.slides {
            display: block;
            position: relative;
            height: 400px;
            margin: 0;
            padding: 100px;
            overflow: hidden;
            list-style: none;
        }

        .slides * {
            user-select: none;
            -ms-user-select: none;
            -moz-user-select: none;
            -khtml-user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        ul.slides input {
            display: none;
        }


        .slide-container {
            display: block;
        }

        .slide-image {
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            opacity: 0;
            transition: all .7s ease-in-out;
        }

        .slide-image video {
            width: 75%;
            height: auto;
        }

        .carousel-controls {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            font-size: 100px;
            line-height: 600px;
            color: #fff;
        }

        .carousel-controls label {
            display: none;
            position: absolute;
            padding: 50px 20px;
            opacity: 0;
            transition: opacity .2s;
            cursor: pointer;
        }

        .slide-image:hover+.carousel-controls label {
            opacity: 0.5;
        }

        .carousel-controls label:hover {
            opacity: 1;
        }

        .carousel-controls .prev-slide {
            width: 9%;
            text-align: left;
            left: 0;
        }

        .carousel-controls .next-slide {
            width: 9%;
            text-align: right;
            right: 0;
        }

        .carousel-dots {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0px;
            z-index: 999;
            margin-top:50px;
            text-align: center;
        }

        .carousel-dots .carousel-dot {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #fff;
            opacity: 0.5;
            margin: 10px;
        }

        input:checked+.slide-container .slide-image {
            opacity: 1;
            transform: scale(1);
            transition: opacity 1s ease-in-out;
        }

        input:checked+.slide-container .carousel-controls label {
            display: block;
        }

        input#img-1:checked~.carousel-dots label#img-dot-1,
        input#img-2:checked~.carousel-dots label#img-dot-2,
        input#img-3:checked~.carousel-dots label#img-dot-3,
        input#img-4:checked~.carousel-dots label#img-dot-4,
        input#img-5:checked~.carousel-dots label#img-dot-5,
        input#img-6:checked~.carousel-dots label#img-dot-6 {
            opacity: 1;
        }


        input:checked+.slide-container .nav label {
            display: block;
        }
    </style>
</head>



<body>

    <header>
        <nav>
            <a href="index.html">
                <div class="group">
                    <img src="logo.svg" width="36" height="36">
                    <div class="logo">
                        GREEN <span style="color:#10b981;padding-left:.5rem;"> SCORPION</span>
                    </div>
                </div>
            </a>

            <div class="menu">
                <input type="checkbox" id="menu-toggle">
                <label for="menu-toggle">
                    <img src="menu.svg">
                </label>
                <ul>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a href="results.html">Results</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section class="hero">
            <h1>Marketing <br><span style="color:#10b981;">Videos</span></h1>
            <p></p>
        </section>

        <div>
            <div class="carousel">
                <ul class="slides">
                    <input type="radio" name="radio-buttons" id="img-1" checked />
                    <li class="slide-container">
                        <div class="slide-image">
                            <video src="BrownSugarPremiumGuitarandBass.mp4" poster="Screenshot 2025-12-11 050652.png"
                                controls>
                        </div>
                        <div class="carousel-controls">
                            <label for="img-3" class="prev-slide">
                                <span>&lsaquo;</span>
                            </label>
                            <label for="img-2" class="next-slide">
                                <span>&rsaquo;</span>
                            </label>
                        </div>
                    </li>
                    <input type="radio" name="radio-buttons" id="img-2" />
                    <li class="slide-container">
                        <div class="slide-image">
                            <video src="finished true tune (1).mp4" controls>
                        </div>
                        <div class="carousel-controls">
                            <label for="img-1" class="prev-slide">
                                <span>&lsaquo;</span>
                            </label>
                            <label for="img-3" class="next-slide">
                                <span>&rsaquo;</span>
                            </label>
                        </div>
                    </li>
                    <input type="radio" name="radio-buttons" id="img-3" />
                    <li class="slide-container">
                        <div class="slide-image">
                            <video src="neck video.mp4" controls>
                        </div>
                        <div class="carousel-controls">
                            <label for="img-2" class="prev-slide">
                                <span>&lsaquo;</span>
                            </label>
                            <label for="img-1" class="next-slide">
                                <span>&rsaquo;</span>
                            </label>
                        </div>
                    </li>
                    <br>
                    <div class="carousel-dots">
                        <label for="img-1" class="carousel-dot" id="img-dot-1"></label>
                        <label for="img-2" class="carousel-dot" id="img-dot-2"></label>
                        <label for="img-3" class="carousel-dot" id="img-dot-3"></label>
                    </div>
                </ul>
            </div>
        </div>


    </main>
</body>

</html>
