<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>

    <style>
        :root {
            --bg-color: radial-gradient(circle, #064e3b, #022c22, #000000);
            --accent-color: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.4);
            --text-main: #e5e5e5;
            --text-dim: #a3a3a3;
            --card-bg: #0a0f0d;
            --border-color: #1a2e25;
            --mono-font: 'mono', monospace;
        }
    
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    
    
        @keyframes appear {
            from {
                opacity: 0;
                transform: scaleX(0);
            }
    
            to {
                opacity: 1;
                transform: scaleX(1);
            }
        }
    
        body {
            background: radial-gradient(circle, #022c22, #000000, #023729);
            font-family: ui-sans-serif, system-ui, sans-serif;
            color: white;
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
    
    
        body::before {
            content: "GREEN SCORPION";
            position: fixed;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 10vw;
            font-weight: 700;
            letter-spacing: -4px;
            color: rgba(255, 255, 255, 0.3);
            white-space: nowrap;
            z-index: -1;
            pointer-events: none;
        }
    
    
        .hero {
            padding: 6rem 0 4rem 0;
            text-align: center;
            background: rgba(5, 10, 8, 0.8);
        }
    
        .hero h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            font-style: italic;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -4px;
            animation: appear 2s ease-in;
            margin-bottom: 2rem;
        }
    
        .hero p {
            max-width: 90%;
            margin: 0 auto;
            color: var(--text-dim);
            font-size: 1.3rem;
        }
    
        header {
            padding: 1rem 1rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(5, 10, 8, 0.8);
            backdrop-filter: blur(10px);
        }
    
        .logo {
            display: flex;
            font-weight: 900;
            font-style: italic;
            color: white;
            justify-content: flex-start;
            padding-left: 1rem;
            padding-right: 5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            font-size: 1.5rem;
        }
    
    
        ul {
            font-weight: 500;
            list-style: none;
            gap: 15px;
            text-decoration: none;
            text-transform: uppercase;
            justify-content: space-between;
            display: inline-flex;
        }
    
    
    
        nav {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            padding-bottom: 2rem;
        }
    
        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .reveal {
            view-timeline-name: --reveal;
            view-timeline-axis: block;
            animation: reveal linear both;
            animation-timeline: --reveal;
            animation-range: entry 5% entry 35%;
        }

        a {
            color: white;
            text-decoration: none;
            padding: 20px;
        }

        li:hover {
            color: #0ac687b4;
            text-decoration-line: underline;
            text-decoration-thickness: 3px;
            transition: ease-in 0.3s;
        }


        .group {
            align-items: center;
            display: flex;
            justify-content: flex-start;
        }

        #menu-toggle{
            display: none;
        }

        button {
            background: radial-gradient(circle, #064e3b, #022c22, #000000);
            padding: 10px 20px;
            font-weight: 600;
            margin: 2rem auto;
            border-radius: 8px;
            max-width: 200px;
        }

        button:hover {
            scale: 1.2;
            transition: ease-in 0.3s;
        }


        @media (max-width: 768px) {
            body {
                overflow-x: hidden;
            }

            .menu ul {
                box-sizing: border-box;
                max-width: calc(100vw - 2rem);
            }

            .logo {
                display: none;
            }

            header {
                max-width: 100%;
                padding: 0.5rem;
            }

            nav {
                align-items: center;
                padding: 0px;
                display: flex;
                text-align: left;
                justify-content: space-between;
            }

            label[for="menu-toggle"] {
                display: inline-block;
                color: white;
                font-size: 1rem;
                padding: 0.5rem 2rem;
                cursor: pointer;
            }

            .menu ul {
                display: none;
                flex-direction: column;
                position: absolute;
                font-size: 1rem;
                width: 150px;
                right: 1rem;
                top: 60px;
                background: radial-gradient(circle, #064e3b, #022c22, #000000);
                box-shadow: 2px 2px 10px 2px rgba(255, 255, 255, 0.5);
                z-index: 1;
            }

            #menu-toggle:checked~ul {
                display: flex;
            }

            #menu-toggle {
                display: none;
            }

            .hero h1 {
                font-size: 3rem;
                letter-spacing: -2px;
            }

            .hero {
                z-index: 2;
            }

            li a {
                font-size: 1.1em;
                display: block;
                line-height: 2em;
                padding: 5%;
            }
        }

    </style>

</head>

<body>
    <header>
    <nav>
        <a href="index.html">
            <div class="group">
                <img src="logo.svg" width="36" height="36">
                <div class="logo">
                    GREEN <span style="color:#10b981;padding-left:.5rem;"> SCORPION</span>
                </div>
            </div>
        </a>

        <div class="menu">
            <input type="checkbox" id="menu-toggle">
            <label for="menu-toggle">
                <img src="menu.svg">
            </label>
            <ul>
                <li><a href="about.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="results.html">Results</a></li>
            </ul>
        </div>
    </nav>
    </header>
    <main>
        <section class="hero">
            <h1>Contact <span style="color:#10b981;">Us</span></h1>

        </section>

        <form style="margin:0 auto; padding:100px; width:80vw; font-size:20px; display:block; color:white; background-color: transparent;">
            <p>
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required>
            </p>

            <p>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required>
            </p>

            <p>
                <label for="number">If you want a call back enter your phone number:</label><br>
                <input type="number" id="number" name="number">
            </p>

            <p>
                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" cols="30" required></textarea>
            </p>

            <p>
                <button type="submit">Submit</button>
            </p>
        </form>

</body>

</html>
