<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a {
            color: white;
            text-decoration: none;
            padding: 20px;
        }

      


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle, #022c22, #000000, #023729);
            font-family: ui-sans-serif, system-ui, sans-serif;
            color: white;
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body::before {
            content: "Performance, Precision, Passion";
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 7vw;
            font-weight: 700;
            letter-spacing: -5px;
            color: rgba(255, 255, 255, 0.2);
            white-space: nowrap;
            z-index: -1;
            pointer-events: none;
        }

        nav ul {
            font-weight: 500;
            list-style: none;
            gap: 15px;
            text-decoration: none;
            text-transform: uppercase;
            justify-content: space-between;
            display: inline-flex;
        }

        nav {
            align-items: center;
            padding-bottom: 2rem;
            display: flex;
            max-width: 100%;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        .group {
            align-items: center;
            display: flex;
            justify-content: flex-start;
        }

        #menu-toggle,
        label,
        input {
            display: none;
        }

        header {
            padding: 1rem 1rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(5, 10, 8, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            font-weight: 900;
            font-style: italic;
            color: white;
            justify-content: flex-start;
            padding-left: 1rem;
            padding-right: 5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            font-size: 1.5rem;
        }

        ul.navigation {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
        }

        ul.navigation li {
            position: relative;
            display: block;
            font-size: 13px;
        }

        ul.navigation li>ul {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 130px;
            padding: 0;
        }

        ul.navigation li a {
            text-decoration: none;
            color: #000;
            padding: 10px 20px;
            display: block;
        }

        ul.navigation li:hover a {
            color: #0ac687b4;
            text-decoration-line: underline;
            text-decoration-thickness: 3px;
            transition: ease-in 0.3s;
        }

        ul.navigation li:hover>ul {
            display: block;
        }

        ul.navigation li:hover>ul li {
            width: 100%;
        }

        ul.navigation li:hover ul ul {
            left: 100%;
            top: 0;
        }

        ul.navigation li ul li:hover>a {
            color: #000;
        }

        ul.navigation li.dropdown:before {
            content: "";
            border: 5px solid transparent;
            border-top-color: #000;
            position: absolute;
            right: 3px;
            top: 54%;
            transform: translateY(-50%);
        }

        ul.navigation li:hover:before {
            border-top-color: #fff;
        }

        ul.navigation li.dropdown li.dropdown:before {
            border-top-color: #fff;
        }

        ul.navigation li.dropdown li.dropdown:hover:before {
            border-top-color: #2c2c2c;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <a href="index.html">
                <div class="group">
                    <img src="icons/logo.svg" width="36" height="36">
                    <div class="logo">
                        GREEN <span style="color:#10b981;padding-left:.5rem;"> SCORPION</span>
                    </div>
                </div>
            </a>
            <div class="menu">
                <input type="checkbox" id="menu-toggle">
                <label for="menu-toggle">
                    <img src="icons/menu.svg">
                </label>

                <ul class="navigation">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="contact-us.html">Contact Us</a></li>
                    <li class="dropdown"><a href="portfolio.html">Portfolio</a>
                        <ul>
                            <li class="dropdown">
                            <li><a href="web-portfolio.html">Web Portfolio</a></li>
                            <li><a href="marketing-portfolio.html">Marketing Portfolio</a></li>
                            <li><a href="graphic-design-portfolio.html">Graphic Design</a></li>
                            <li><a href="videos.html">Video Portfolio</a></li>
                    </li>
                </ul>
                </li>

                </ul>
            </div>
        </nav>
    </header>
</body>

</html>
